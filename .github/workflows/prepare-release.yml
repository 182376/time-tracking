name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release commit and tag
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check tag
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $existingTag = git ls-remote --tags origin "refs/tags/v$version"
          if ($existingTag) {
            throw "Tag v$version already exists."
          }

      - name: Install dependencies
        run: npm ci

      - name: Sync version files
        run: node scripts/release.mjs sync-version ${{ inputs.version }}

      - name: Validate changelog
        run: node scripts/release.mjs validate-changelog ${{ inputs.version }}

      - name: Verify release notes generation
        run: node scripts/release.mjs write-release-notes ${{ inputs.version }} dist-release/release-notes.md

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: |
          npm test
          npm run test:replay

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

      - name: Commit version changes and tag
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml CHANGELOG.md
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "release: v$version"
          } else {
            Write-Host "No version file changes to commit; tagging current commit."
          }
          git tag "v$version"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v$version"

      - name: Ensure updater signing key exists
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate updater manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-release | Out-Null
          $version = "${{ inputs.version }}"
          $tagName = "v$version"
          $bundleDir = "src-tauri/target/release/bundle"
          $signatureFile = Get-ChildItem -Path $bundleDir -Recurse -File -Filter "*.sig" |
            Where-Object { $_.Name -like "*.exe.sig" } |
            Select-Object -First 1

          if (-not $signatureFile) {
            throw "Could not find updater .exe.sig artifact under $bundleDir."
          }

          $installerFilePath = $signatureFile.FullName -replace "\.sig$", ""
          if (-not (Test-Path -LiteralPath $installerFilePath)) {
            throw "Could not find installer matching $($signatureFile.FullName)."
          }

          $installerFile = Get-Item -LiteralPath $installerFilePath
          $signature = (Get-Content -Raw -Encoding UTF8 -LiteralPath $signatureFile.FullName).Trim()
          $encodedName = [System.Uri]::EscapeDataString($installerFile.Name)
          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/$tagName/$encodedName"

          node scripts/release.mjs write-latest-json $version $assetUrl $signature dist-release/latest.json windows-x86_64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Time Tracker v${{ inputs.version }}
          body_path: dist-release/release-notes.md
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish updater channel
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force updater-publish | Out-Null
          Copy-Item -LiteralPath dist-release/latest.json -Destination updater-publish/latest.json

          Set-Location updater-publish
          git init -b updates
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "updates: latest v${{ inputs.version }}"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin updates
