name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing tag version to publish, for example 0.2.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          if (-not $version) {
            throw "Could not derive version from ${{ github.ref_name }}."
          }
          "VERSION=$version" >> $env:GITHUB_ENV
          "TAG_NAME=v$version" >> $env:GITHUB_ENV

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: |
          git fetch origin "refs/tags/$env:TAG_NAME:refs/tags/$env:TAG_NAME"
          git checkout "$env:TAG_NAME"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate changelog
        run: node scripts/release.mjs validate-changelog $env:VERSION

      - name: Generate release notes
        run: node scripts/release.mjs write-release-notes $env:VERSION dist-release/release-notes.md

      - name: Ensure updater signing key exists
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate updater manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-release | Out-Null
          $bundleDir = "src-tauri/target/release/bundle"
          $signatureFile = Get-ChildItem -Path $bundleDir -Recurse -File -Filter "*.sig" |
            Where-Object { $_.Name -like "*.exe.sig" } |
            Select-Object -First 1

          if (-not $signatureFile) {
            throw "Could not find updater .exe.sig artifact under $bundleDir."
          }

          $installerFilePath = $signatureFile.FullName -replace "\.sig$", ""
          if (-not (Test-Path -LiteralPath $installerFilePath)) {
            throw "Could not find installer matching $($signatureFile.FullName)."
          }

          $installerFile = Get-Item -LiteralPath $installerFilePath
          $signature = (Get-Content -Raw -Encoding UTF8 -LiteralPath $signatureFile.FullName).Trim()
          $encodedName = [System.Uri]::EscapeDataString($installerFile.Name)
          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/$encodedName"

          node scripts/release.mjs write-latest-json $env:VERSION $assetUrl $signature dist-release/latest.json windows-x86_64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Time Tracker ${{ env.TAG_NAME }}
          body_path: dist-release/release-notes.md
          draft: false
          prerelease: ${{ contains(env.TAG_NAME, '-') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish updater channel
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force updater-publish | Out-Null
          Copy-Item -LiteralPath dist-release/latest.json -Destination updater-publish/latest.json

          Set-Location updater-publish
          git init -b updates
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "updates: latest $env:TAG_NAME"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin updates
